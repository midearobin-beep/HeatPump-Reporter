# ==========================================
# HeatPump-Reporter 动态搜索关键词与范围配置
# ==========================================

queries:
  # --- 欧洲 (Europe) ---
  - query: '("Heat pump" OR "HVAC") AND ("subsidy" OR "policy" OR "regulation")'
    lang: "English (UK/EU/International)"
    params: "&hl=en-GB&gl=GB&ceid=GB:en"
    continent: "Europe"

  - query: '("Wärmepumpe") AND ("Förderung" OR "Richtlinie" OR "Markt" OR "Verbot")'
    lang: "German (Germany/Austria)"
    params: "&hl=de&gl=DE&ceid=DE:de"
    continent: "Europe"

  - query: '("pompe à chaleur") AND ("subvention" OR "politique" OR "marché")'
    lang: "French (France)"
    params: "&hl=fr&gl=FR&ceid=FR:fr"
    continent: "Europe"

  - query: '("pompa di calore") AND ("incentivi" OR "sussidi" OR "politica" OR "mercato")'
    lang: "Italian (Italy)"
    params: "&hl=it&gl=IT&ceid=IT:it"
    continent: "Europe"

  - query: '("bomba de calor") AND ("subvención" OR "política" OR "mercato")'
    lang: "Spanish (Spain)"
    params: "&hl=es&gl=ES&ceid=ES:es"
    continent: "Europe"

  - query: '("warmtepomp") AND ("subsidie" OR "beleid" OR "markt")'
    lang: "Dutch (Netherlands)"
    params: "&hl=nl&gl=NL&ceid=NL:nl"
    continent: "Europe"

  - query: '("αντλία θερμότητας") AND ("επιδότηση" OR "αγορά")'
    lang: "Greek (Greece)"
    params: "&hl=el&gl=GR&ceid=GR:el"
    continent: "Europe"

  # --- 亚洲 (Asia) ---
  - query: '("Heat pump") AND ("policy" OR "market" OR "incentive")'
    lang: "English (India)"
    params: "&hl=en-IN&gl=IN&ceid=IN:en"
    continent: "Asia"

  - query: '("тепловой насос") AND ("субсидия" OR "рынок" OR "энергоэффективность")'
    lang: "Russian (Russia/CIS)"
    params: "&hl=ru&gl=RU&ceid=RU:ru"
    continent: "Asia"

  - query: '("ısı pompası") AND ("destek" OR "pazar" OR "teşvik")'
    lang: "Turkish (Turkey)"
    params: "&hl=tr&gl=TR&ceid=TR:tr"
    continent: "Asia"

  - query: '("bơm nhiệt") AND ("thị trường" OR "chính sách")'
    lang: "Vietnamese (SEA/Vietnam)"
    params: "&hl=vi&gl=VN&ceid=VN:vi"
    continent: "Asia"

  - query: '("дулааны насос")'
    lang: "Mongolian (Mongolia)"
    params: "&hl=mn&gl=MN&ceid=MN:mn"
    continent: "Asia"

  # --- 其他地区 (Oceania/Americas) ---
  - query: '("Heat pump") AND ("rebate" OR "regulation" OR "market")'
    lang: "English (Australia)"
    params: "&hl=en-AU&gl=AU&ceid=AU:en"
    continent: "Oceania"

  - query: '("bomba de calor") AND ("mercado" OR "eficiência energética")'
    lang: "Portuguese (Brazil)"
    params: "&hl=pt-BR&gl=BR&ceid=BR:pt"
    continent: "South America"

  - query: '("Heat pump" OR "HVAC") AND ("subsidy" OR "policy" OR "tax credit")'
    lang: "English (US/North America)"
    params: "&hl=en-US&gl=US&ceid=US:en"
    continent: "North America"
